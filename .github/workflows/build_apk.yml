 name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11' # تم خفضها إلى 11 لتتوافق مع الحزم القديمة في مشروعك

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Flutter Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            flutter-pub-${{ runner.os }}-

      - name: Install Flutter (Compatible Stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6' # إصدار مستقر يضمن تشغيل الحزم دون كسر أندرويد
          channel: stable
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release and upload APK
        uses: ncipollo/release-action@v1
        with:
          tag: 'apk-release-${{ github.run_number }}'
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}         key: flutter-pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            flutter-pub-${{ runner.os }}-

      - name: Install Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release and upload APK
        uses: ncipollo/release-action@v1
        with:
          tag: 'apk-release-${{ github.run_number }}'
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
