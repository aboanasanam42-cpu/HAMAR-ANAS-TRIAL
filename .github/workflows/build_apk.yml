name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Flutter Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-pub-${{ runner.os }}-

      - name: Install Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Advanced Auto-Fix Dependencies and SDKs
        run: |
          # 1. تخطي قيود الـ SDK الصارمة
          sed -i 's/sdk: .*/sdk: ">=3.0.0 <4.0.0"/' pubspec.yaml
          
          # 2. تنظيف الكاش وجلب الحزم وتحديث المتعارض منها تلقائياً
          flutter pub cache clean --force || true
          flutter pub get
          
          # 3. أمر ذكي (مصلح الطرف الثالث) لإجبار الحزم القديمة (مثل android_long_task) على الترقية أو التوافق
          flutter pub upgrade --major-versions --allow-mismatches || true

      - name: Build release APK (With Auto-Bypass for Legacy Errors)
        run: |
          # تنفيذ بناء الـ APK مع توجيه الـ Gradle لتخطي تحذيرات الكود القديم
          flutter build apk --release --no-sound-null-safety || flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release and upload APK
        uses: ncipollo/release-action@v1
        with:
          tag: 'apk-release-${{ github.run_number }}'
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
