name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build: # أو اسم الـ job لديك
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Flutter Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            flutter-pub-${{ runner.os }}-

      - name: Install Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Ultimate Bypass and Build ARM64 APK
        run: |
          # 1. توحيد إصدار الكوتلن ليتوافق مع الحزم
          export GRADLE_OPTS="-Dorg.gradle.project.kotlinVersion=1.9.20"
          
          # 2. سكربت ذكي لحقن الـ namespace للمكتبات القديمة في الـ pub-cache لتفادي خطأ التسمية
          find ~/.pub-cache/hosted/pub.dev/ -name "build.gradle" -exec sh -c '
            if ! grep -q "namespace" "$1"; then
              sed -i "/android {/a \    namespace \"com.example.fallbacknamespace\"" "$1"
            fi
          ' _ {} \;

          # 3. حل مشكلة إصدارات Firebase الناقصة (مثل خطأ firebase-auth-ktx) عبر إجبار مشروع أندرويد على دمج الـ Firebase BOM تلقائياً
          if [ -f android/app/build.gradle ]; then
            sed -i '/dependencies {/a \    implementation platform("com.google.firebase:firebase-bom:33.1.1")' android/app/build.gradle
          fi

          # 4. بناء نسخة الـ APK النهائية المستقرة والمخصصة لمعمارية هاتفك
          flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons

      - name: Create Release and upload APK
        uses: ncipollo/release-action@v1
       with:
        artifacts: "path/to/your/app-release-33.apk" # تم تغيير files إلى artifacts
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: "apk-release-33"
        # أي إعدادات أخرى تحتاجها...


      - name: Create Release and upload APK
        uses: ncipollo/release-action@v1
        with:
          tag: 'apk-release-${{ github.run_number }}'
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
