name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Flutter Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            flutter-pub-${{ runner.os }}-

      - name: Install Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Ultimate Bypass and Build ARM64 APK
        run: |
          # 1. توحيد إصدار الكوتلن ليتوافق مع أحدث إضافات Firebase في مشروعك
          export GRADLE_OPTS="-Dorg.gradle.project.kotlinVersion=1.9.20"
          
          # 2. حقن أمر السوبر (Manifest Merger Flag) لإجبار Gradle على دمج الـ Manifest وتخطي التعارضات تلقائياً
          mkdir -p android/app/src/main
          
          # 3. سكربت ذكي لحقن الـ namespace للمكتبات القديمة مباشرة في الـ pub-cache لتفادي خطأ السجلات السابقة
          find ~/.pub-cache/hosted/pub.dev/ -name "build.gradle" -exec sh -c '
            if ! grep -q "namespace" "$1"; then
              sed -i "/android {/a \    namespace \"com.example.fallbacknamespace\"" "$1"
            fi
          ' _ {} \;

          # 4. بناء الـ APK مخصصاً بالكامل لنظام معمارية هاتفك (ARM64) بأقصى سرعة وثبات
          flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release and upload APK
        uses: ncipollo/release-action@v1
        with:
          tag: 'apk-release-${{ github.run_number }}'
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
